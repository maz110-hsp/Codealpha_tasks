<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a SocialApp account to connect with friends">
    <title>Register - SocialApp</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-logo">SocialApp</h1>
            <p class="auth-subtitle">Sign up to see posts from your friends</p>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <input type="text" id="regUsername" name="username" placeholder="Username" required minlength="3"
                        maxlength="20" autocomplete="username">
                </div>
                <div class="form-group">
                    <input type="email" id="regEmail" name="email" placeholder="Email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <input type="text" id="regDisplayName" name="display_name" placeholder="Display Name (optional)"
                        autocomplete="name">
                </div>
                <div class="form-group">
                    <input type="password" id="regPassword" name="password" placeholder="Password (min 6 characters)"
                        required minlength="6" autocomplete="new-password">
                </div>
                <div id="registerError" class="form-error" style="display:none"></div>
                <button type="submit" id="registerBtn" class="btn btn-primary btn-full">Sign Up</button>
            </form>

            <div class="auth-divider"><span>OR</span></div>
            <p class="auth-switch">Have an account? <a href="/login">Log in</a></p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('registerError');
            errorEl.style.display = 'none';

            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const display_name = document.getElementById('regDisplayName').value.trim();
            const password = document.getElementById('regPassword').value;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, display_name, password })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorEl.textContent = data.error;
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Something went wrong. Please try again.';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>

</html>
