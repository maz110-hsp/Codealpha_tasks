<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="User Profile - SocialApp">
    <title>Profile - SocialApp</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">SocialApp</a>
            <div class="nav-search">
                <input type="text" id="searchInput" placeholder="Search users..." autocomplete="off">
                <div class="search-results" id="searchResults"></div>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link" id="navHome" title="Home">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                </a>
                <a href="/explore" class="nav-link" id="navExplore" title="Explore">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.35-4.35" />
                    </svg>
                </a>
                <a href="#" class="nav-link active" id="navProfile" title="Profile">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </a>
                <button class="nav-link btn-icon" id="logoutBtn" title="Logout">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1-2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Profile Header -->
    <main class="main-content">
        <div class="profile-container">
            <div class="card profile-header" id="profileHeader">
                <div class="profile-avatar-section">
                    <img src="/uploads/default-avatar.png" alt="avatar" class="avatar avatar-lg" id="profileAvatar">
                </div>
                <div class="profile-info">
                    <div class="profile-name-row">
                        <h1 id="profileDisplayName">Loading...</h1>
                        <button class="btn btn-secondary btn-sm" id="profileAction" style="display:none">Follow</button>
                    </div>
                    <p class="profile-username" id="profileUsername">@...</p>
                    <div class="profile-stats">
                        <span style="cursor:pointer;" id="profilePostsStat"><strong id="profilePosts">0</strong> posts</span>
                        <span style="cursor:pointer;" id="profileFollowersStat"><strong id="profileFollowers">0</strong> followers</span>
                        <span style="cursor:pointer;" id="profileFollowingStat"><strong id="profileFollowing">0</strong> following</span>
                    </div>
                    <p class="profile-bio" id="profileBio"></p>
                </div>
            </div>

            <!-- Edit Profile Modal -->
            <div class="modal-overlay" id="editProfileModal" style="display:none">
                <div class="modal card">
                    <div class="modal-header">
                        <h2>Edit Profile</h2>
                        <button class="btn-close" id="closeEditProfile">&times;</button>
                    </div>
                    <form id="editProfileForm">
                        <div class="form-group">
                            <label for="editDisplayName">Display Name</label>
                            <input type="text" id="editDisplayName" placeholder="Display Name">
                        </div>
                        <div class="form-group">
                            <label for="editBio">Bio</label>
                            <textarea id="editBio" placeholder="Tell us about yourself" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="editAvatar">Profile Picture</label>
                            <input type="file" id="editAvatar" accept="image/*">
                            <button type="button" class="btn btn-danger btn-sm" id="deleteAvatarBtn" style="margin-top:8px;display:none;">Delete Current Picture</button>
                        </div>
                        <div class="modal-footer">
                            <button type="submit" class="btn btn-primary btn-sm">Save</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Followers List Modal -->
            <div class="modal-overlay" id="followersModal" style="display:none">
                <div class="modal card" style="max-width:500px;">
                    <div class="modal-header">
                        <h2>Followers</h2>
                        <button class="btn-close" id="closeFollowersModal">&times;</button>
                    </div>
                    <div id="followersList" style="max-height:400px;overflow-y:auto;">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>

            <!-- Following List Modal -->
            <div class="modal-overlay" id="followingModal" style="display:none">
                <div class="modal card" style="max-width:500px;">
                    <div class="modal-header">
                        <h2>Following</h2>
                        <button class="btn-close" id="closeFollowingModal">&times;</button>
                    </div>
                    <div id="followingList" style="max-height:400px;overflow-y:auto;">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>

            <!-- Posts -->
            <div id="postsContainer"></div>
            <div class="loading" id="loading" style="display:none">
                <div class="spinner"></div>
            </div>
            <div class="empty-state" id="emptyState" style="display:none">
                <p>No posts yet.</p>
            </div>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const username = window.location.pathname.split('/profile/')[1];
            if (username) {
                loadProfile(username);
            }
        });
    </script>
</body>

</html>
